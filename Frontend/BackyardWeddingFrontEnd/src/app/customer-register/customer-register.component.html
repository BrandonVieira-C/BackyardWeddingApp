<div class="customerlogin" style="float:left; margin-right: 100px" >
    <form #customerLoginForm="ngForm" (ngSubmit)="customerLoggedIn()">
        <h2>Log In</h2>
        <div> 
            <label for="">Customer ID</label>
        </div>
        <div>
            <input type="number" name="customerId" ngModel>
        </div> 
        <div>
            <label for="">Last name</label>
        </div>
        <div>
            <input type="text" name="lastName" ngModel>
        </div>

    <button routerLink="/backyards" type="submit">Submit</button>
    </form>
</div>

<div class="customerregister" style="float:right; margin-left: 100px" >
    <form [formGroup]="customerRegisterForm" (ngSubmit)="addCustomer()" class="form">
        <h2>Register</h2>
        <div class="form-group">
            <label >First name</label> 
            <input type="text" class="form-control" formControlName="firstName" >
        </div>
        <div class="form-group">
            <label >Last name</label>
            <input type="text" class="form-control" formControlName="lastName" >
        </div>

        <button type="submit">Register</button>
    </form>
</div>

<table border="1px" style="margin-left: 700px">
    <thead>
        <tr>
            <th >
                 Customer ID 
            </th>
            <th> First name 
            </th>
            <th> Last Name </th>
        </tr>
    </thead>
    <tbody *ngFor="let customerDto of customers">
        <tr>
            <td>{{customerDto.customerId}}</td>

            <td>{{customerDto.firstName}}</td>

            <td>{{customerDto.lastName}}</td>
        </tr>       
    </tbody>
</table>
