<!-- **REGISTER EVENT** -->

<div class="customerregister" style="float:right; margin-left: 100px" >
    <form [formGroup]="eventRegisterForm" (ngSubmit)="addEvent()" class="form">
        <h2>Event Register</h2>
        <div class="form-group">
            <label >Event name</label> 
            <input type="text" class="form-control" formControlName="eventName" >
        </div>
        <div class="form-group">
            <label >Event date</label>
            <input type="date" class="form-control" formControlName="eventDate" >
        </div>
        <div class="form-group">
            <label >Your customer ID</label>
            <input type="text" class="form-control" formControlName="customerId" >
        </div>

        <button type="submit">Register</button>
    </form>
</div>
